<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0e27">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Terminal OS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <!-- ===================== TELA DE LOGIN ===================== -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 64 64" width="64" height="64">
          <rect x="4" y="8" width="56" height="40" rx="4" fill="#3b82f6"/>
          <rect x="8" y="12" width="48" height="32" rx="2" fill="#0a0e27"/>
          <rect x="20" y="52" width="24" height="4" fill="#3b82f6"/>
          <text x="32" y="34" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="14" font-weight="bold">T_</text>
        </svg>
      </div>
      <h1 class="login-title">Terminal OS</h1>
      <p class="login-subtitle" id="login-subtitle">Sistema Web · Multiusuário</p>
      
      <form id="login-form" class="login-form">
        <div class="input-group">
          <input type="text" id="username" placeholder="Usuário" autocomplete="username" required autofocus>
          <label>Usuário</label>
        </div>
        <div class="input-group">
          <input type="password" id="password" placeholder="Senha" autocomplete="current-password" required>
          <label>Senha</label>
        </div>
        <button type="submit" class="btn-primary">Entrar</button>
        <p class="login-hint" id="login-hint">Dica: admin / admin</p>
        <p class="login-error" id="login-error"></p>
      </form>
      
      <div class="login-footer">
        <span id="terminal-info"></span>
      </div>
    </div>
  </div>

  <!-- ===================== DESKTOP ===================== -->
  <div id="desktop" class="desktop hidden">
    <!-- Barra superior -->
    <div class="topbar">
      <div class="topbar-left">
        <button class="topbar-btn" id="apps-menu-btn" title="Aplicativos">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/>
            <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            <circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/>
          </svg>
        </button>
        <span class="topbar-title">Terminal OS</span>
      </div>
      <div class="topbar-center">
        <span id="user-display"></span>
      </div>
      <div class="topbar-right">
        <span class="clock" id="clock">--:--</span>
        <span class="date" id="date">--/--/----</span>
        <button class="topbar-btn" id="logout-btn" title="Sair">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Menu de apps -->
    <div id="apps-menu" class="apps-menu hidden">
      <input type="text" id="apps-search" placeholder="Buscar aplicativos..." class="apps-search">
      <div class="apps-grid" id="apps-grid"></div>
    </div>

    <!-- Área de trabalho -->
    <div class="workspace" id="workspace">
      <!-- Atalhos no desktop -->
      <div class="desktop-icons" id="desktop-icons"></div>
      <!-- Janelas -->
      <div id="windows-container"></div>
    </div>

    <!-- Barra de status -->
    <div class="statusbar">
      <span id="conn-status" class="status-ok">● Online</span>
      <span id="session-info"></span>
      <span style="margin-left:auto" id="uptime">uptime: 00:00</span>
    </div>
  </div>

  <!-- ===================== TELA DE OFFLINE ===================== -->
  <div id="offline-screen" class="offline-screen hidden">
    <div class="offline-content">
      <svg viewBox="0 0 64 64" width="80" height="80">
        <circle cx="32" cy="32" r="28" fill="none" stroke="#ef4444" stroke-width="3"/>
        <line x1="14" y1="14" x2="50" y2="50" stroke="#ef4444" stroke-width="3"/>
      </svg>
      <h2>Sem conexão</h2>
      <p>Tentando reconectar...</p>
      <div class="offline-spinner"></div>
      <p class="offline-retry" id="offline-retry">Próxima tentativa em 5s</p>
    </div>
  </div>

  <script src="app.js"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
